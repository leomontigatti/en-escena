services:
  postgres:
    image: postgres:17-alpine
    container_name: en-escena-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: en-escena
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d en-escena"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
